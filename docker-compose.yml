version: "3.8"

services:
  djzs-oracle:
    image: djzs/djzs-ai:latest
    pull_policy: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - DATABASE_URL=${DATABASE_URL:-}
      - VENICE_API_KEY=${VENICE_API_KEY:-}
      - VENICE_TIMEOUT_MS=${VENICE_TIMEOUT_MS:-60000}
      - BASE_RPC_URL=${BASE_RPC_URL:-https://mainnet.base.org}
      - TREASURY_WALLET_ADDRESS=${TREASURY_WALLET_ADDRESS:-}
      - SETTLEMENT_PRIVATE_KEY=${SETTLEMENT_PRIVATE_KEY:-}
      - TRUST_SCORE_CONTRACT_ADDRESS=${TRUST_SCORE_CONTRACT_ADDRESS:-0xB3324D07A8713b354435FF0e2A982A504e81b137}
      - IRYS_PRIVATE_KEY=${IRYS_PRIVATE_KEY:-}
      - XMTP_ENV=${XMTP_ENV:-production}
    restart: unless-stopped
